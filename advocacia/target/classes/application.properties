# ============================================================
# Configurações da Aplicação - Advocacia Imobiliária
# ============================================================

# Nome e porta da aplicação
spring.application.name=Advocacia Imobiliária
server.port=8080

# ============================================================
# Configurações do Banco de Dados H2 (desenvolvimento)
# Para produção, substitua pelo PostgreSQL ou MySQL
# ============================================================
spring.datasource.url=jdbc:h2:mem:advocaciadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ============================================================
# Configurações do Thymeleaf
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

