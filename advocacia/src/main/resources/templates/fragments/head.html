<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!--/* ============================================================
   FRAGMENTO: head.html
   Cabeçalho HTML reutilizável em todas as páginas (SEO + CSS)
   Uso: th:replace="~{fragments/head :: head(pageTitle,pageDescription)}"
   ============================================================ */-->

<head th:fragment="head(pageTitle, pageDescription)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <title th:text="${pageTitle}">Dr. Luiz Henrique | Advogado Imobiliário</title>
    <meta name="description" th:content="${pageDescription}">
    <meta name="keywords" content="advogado imobiliário, direito imobiliário, São Paulo, compra venda imóveis, contrato imobiliário, regularização imóveis, usucapião, advogado SP">
    <meta name="author" th:content="${nomeAdvogado}">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (redes sociais) -->
    <meta property="og:type" content="website">
    <meta property="og:title" th:content="${pageTitle}">
    <meta property="og:description" th:content="${pageDescription}">
    <meta property="og:locale" content="pt_BR">

    <!-- Canonical URL -->
    <link rel="canonical" th:href="@{/}">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">

    <!-- Google Fonts: Playfair Display (serif elegante) + Lato (sans-serif limpa) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- CSS principal -->
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
</head>
</html>
